<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景：ネイビー角丸 -->
  <rect width="32" height="32" rx="7" fill="#1a4f8a"/>

  <!-- 棒グラフ（白）：左から短・中・高 -->
  <rect x="4" y="20" width="5" height="8" rx="1.5" fill="white"/>
  <rect x="11" y="14" width="5" height="14" rx="1.5" fill="white"/>
  <rect x="18" y="9" width="5" height="19" rx="1.5" fill="white"/>

  <!-- 虫眼鏡（水色）：右上 -->
  <circle cx="25.5" cy="9.5" r="4" fill="none" stroke="#63c5f5" stroke-width="2"/>
  <line x1="28.3" y1="12.3" x2="30.5" y2="14.5" stroke="#63c5f5" stroke-width="2" stroke-linecap="round"/>
</svg>
